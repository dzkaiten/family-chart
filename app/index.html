<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Chart</title>
  <!-- family-chart.css lives in ../src (outside the app/ Vite root). A direct
       <link href="../src/..."> resolves to /src/... and is served as the SPA
       fallback index.html (HTTP 200 but 0 CSS rules), silently disabling all
       .f3 styling. It is imported from main.ts via the @lib alias instead so
       Vite resolves it through the module graph. -->
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">Family Chart</h1>
      <div class="app-header-actions">
        <select id="lang-toggle" class="lang-toggle" aria-label="Language">
          <option value="en">English</option>
          <option value="zh-Hans">简体中文</option>
          <option value="zh-Hant">繁體中文</option>
        </select>
        <button id="download-json-btn" class="btn btn-ghost hidden" type="button">Download JSON</button>
        <button id="download-png-btn" class="btn btn-ghost hidden" type="button">Download PNG</button>
        <button id="logout-btn" class="btn btn-ghost hidden" type="button">Log out</button>
      </div>
    </header>

    <main id="view-root" class="view-root">
      <!-- Views are rendered into this container by main.ts -->
    </main>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
