name: Deploy app to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        # npm (not yarn): yarn-classic hits a vite/vitest nested-link bug on this
        # dependency set. package-lock.json is gitignored, so `npm install` (no
        # lockfile) rather than `npm ci`.
        run: npm install

      - name: Typecheck and unit test
        run: |
          npm run typecheck
          npm run test:unit

      - name: Build app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TREE_ID: ${{ secrets.VITE_TREE_ID }}
          VITE_FAMILY_EMAIL: ${{ secrets.VITE_FAMILY_EMAIL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run app:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
